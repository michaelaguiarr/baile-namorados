services:

  postgres:
    image: postgres:16-alpine
    container_name: baile-db-dev
    restart: unless-stopped
    environment:
      POSTGRES_DB: baile_namorados
      POSTGRES_USER: baile
      POSTGRES_PASSWORD: baile123
    ports:
      - "5433:5432"
    volumes:
      - postgres_dev_data:/var/lib/postgresql/data
      - ./src/main/resources/db/seed.sql:/docker-entrypoint-initdb.d/01_seed.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U baile -d baile_namorados"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_dev_data: