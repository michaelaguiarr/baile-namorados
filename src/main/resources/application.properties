spring.application.name=baile-namorados
server.servlet.context-path=/baile

# Datasource - valores sobrescritos pelo docker-compose via env vars
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/baile_namorados}
spring.datasource.username=${DB_USER:baile}
spring.datasource.password=${DB_PASS:baile123}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# Thymeleaf
spring.thymeleaf.cache=false
spring.thymeleaf.encoding=UTF-8

# Server
server.port=${PORT:8080}

# Security - credenciais do admin (sobrescrever em produção via env vars)
app.admin.username=${ADMIN_USER:admin}
app.admin.password=${ADMIN_PASS:baile@2025}

# App
app.evento.nome=Baile dos Namorados
app.evento.local=Igreja Nossa Senhora do Perpétuo Socorro
app.valor.casal=100.00
app.valor.individual=50.00
